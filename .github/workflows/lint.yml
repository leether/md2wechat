name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'scripts/**'
      - 'harness/**'
      - 'package.json'
  pull_request:
    paths:
      - 'SKILL.md'
      - 'scripts/**'
      - 'harness/**'
      - 'package.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate SKILL.md frontmatter
        run: |
          head -5 SKILL.md | grep -q '^---$' || { echo "SKILL.md missing frontmatter"; exit 1; }
          head -5 SKILL.md | grep -q 'name:' || { echo "SKILL.md missing name field"; exit 1; }
          echo "✅ SKILL.md frontmatter valid"

      - name: Lint scripts syntax
        run: |
          for f in $(find scripts harness -name '*.mjs' -print | sort); do
            node --check "$f" && echo "✅ $f" || exit 1
          done

      - name: Run generated check tests
        run: |
          node harness/test-code-generator-contract.mjs
          node harness/run-generated-check-tests.mjs
